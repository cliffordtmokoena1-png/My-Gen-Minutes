# turnserver.conf — template shipped with the repo
# This file is deployed via rsync to the server. The setup.sh will render
# /etc/turnserver.conf by replacing the placeholders below:
#   {{DOMAIN}}              -> turn server domain (e.g. turn.GovClerkMinutes.com)
#   {{STATIC_AUTH_SECRET}}  -> contents of /etc/coturn-secret
#   {{TLS_PORT}}            -> TLS listening port (e.g. 5349 or 443)
#   {{EXTERNAL_IP_LINE}}    -> optional NAT mapping, e.g. external-ip=<PUBLIC>/<PRIVATE>

realm={{DOMAIN}}

# Listen on all interfaces
listening-port=3478
no-tcp-relay

# TLS (use 443 instead if you prefer)
# tls-listening-port=443
tls-listening-port={{TLS_PORT}}

fingerprint
#lt-cred-mech
use-auth-secret
static-auth-secret={{STATIC_AUTH_SECRET}}
server-name={{DOMAIN}}
realm={{DOMAIN}}

# Certs for TLS (issued by certbot)
cert=/etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem
pkey=/etc/letsencrypt/live/{{DOMAIN}}/privkey.pem

# Relay candidates (restricted range)
min-port=50000
max-port=50100

# TURN Lifetime Settings
stale-nonce=600
channel-lifetime=600
allocation-lifetime=600

# Prevent UDP relay cleanup too early
keep-address-family

# Good defaults
no-sslv3
no-tlsv1
no-tlsv1_1
cipher-list="HIGH:!aNULL:!MD5"

# NAT support (only if your NIC has private IP and you have a public EIP)
# external-ip=<EC2_PUBLIC_IP>/<PRIVATE_NIC_IP>
{{EXTERNAL_IP_LINE}}

# Logging
log-file=/var/log/turnserver.log
simple-log

# Disable telnet CLI to avoid noisy "Empty cli-password" error and reduce attack surface
no-cli

# Disable IPv6 if you don't need it (reduces surface, avoids confusing discovery logs)
no-ipv6
