worker_processes 1;
events { worker_connections 1024; }

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;

      # HLS output
      hls on;
      hls_path /tmp/hls;
      hls_fragment 2s;
      hls_playlist_length 10s;

      # Callbacks to host machine's Sophon server
      # host.docker.internal resolves to the host machine from inside Docker
      on_publish http://host.docker.internal:3000/rtmp/on-publish;
      on_done http://host.docker.internal:3000/rtmp/on-done;
    }
  }
}

http {
  server {
    listen 80;

    location /hls {
      types { 
        application/vnd.apple.mpegurl m3u8; 
        video/mp2t ts; 
      }
      root /tmp;
      add_header Cache-Control no-cache;
      add_header Access-Control-Allow-Origin *;
    }
  }
}
